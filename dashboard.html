<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loomo Dashboard</title>
<style>
*{box-sizing:border-box}body{margin:0;font:14px Segoe UI,sans-serif;background:#0b1117;color:#e7eef7;display:grid;grid-template-rows:56px 1fr;grid-template-columns:1fr 340px;height:100vh}header{grid-column:1/-1;display:flex;align-items:center;gap:12px;padding:0 16px;background:#101923;border-bottom:1px solid #223244}.dot{width:10px;height:10px;border-radius:999px;background:#556}.dot.ok{background:#22c55e}.dot.err{background:#ef4444}.grow{flex:1}.row{display:flex;gap:8px;flex-wrap:wrap}.panel{background:#111a24;border:1px solid #223244;border-radius:14px}.main{padding:16px}.camera{position:relative;height:100%;display:grid;place-items:center;background:#000;border-radius:18px;overflow:hidden}.camera img{max-width:100%;max-height:100%;display:none}.overlay{position:absolute;left:12px;right:12px;display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}.top{top:12px}.bottom{bottom:12px}.tag{font:11px Consolas,monospace;padding:5px 8px;border-radius:999px;background:#000b;border:1px solid #334}.sidebar{padding:16px;overflow:auto;background:#0f1821;border-left:1px solid #223244}.section{margin-bottom:12px}.section h3{margin:0 0 8px 0;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#89a}.section .panel{padding:12px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.card{padding:10px;border:1px solid #223244;border-radius:12px;background:#0d1620}.card b{display:block;font-size:11px;color:#89a;margin-bottom:4px}.dpad{display:grid;grid-template-columns:repeat(3,60px);grid-template-rows:repeat(3,60px);gap:6px;justify-content:center}.dpad .empty{visibility:hidden}.dpad button,#connect,#refresh,#camStart,#camStop,#speakBtn,#audioBtn,#audioInfo,#centerHead{background:#182434;color:#eef;border:1px solid #2b3c52;border-radius:12px;cursor:pointer}.dpad button{font-size:18px}.full{width:100%;padding:10px}input[type=text]{width:100%;padding:10px 12px;background:#0d1620;color:#eef;border:1px solid #2b3c52;border-radius:12px}input[type=range]{width:100%}#headPad{position:relative;height:170px;border:1px solid #2b3c52;border-radius:14px;background:#0d1620;cursor:crosshair}#headDot{position:absolute;width:14px;height:14px;border-radius:999px;background:#38bdf8;left:50%;top:50%;transform:translate(-50%,-50%)}#log{height:180px;overflow:auto;font:11px Consolas,monospace;background:#0a1118;border-top:1px solid #223244;padding:10px}.audioPlayer{width:100%;margin-top:10px}
@media(max-width:980px){body{grid-template-columns:1fr;grid-template-rows:56px 45vh auto}.sidebar{border-left:none;border-top:1px solid #223244}}
</style>
</head>
<body>
<header>
<div class="dot" id="dot"></div>
<div id="status">Nicht verbunden</div>
<div class="grow"></div>
<input id="addr" type="text" value="172.30.9.52:8080" style="max-width:220px">
<button id="connect">Verbinden</button>
<button id="refresh">Status</button>
</header>
<div class="main">
<div class="camera panel">
<div class="overlay top"><span class="tag" id="camState">camera idle</span><span class="tag" id="fps">fps --</span></div>
<img id="cam" alt="camera">
<div id="camMsg">Kein Kamerabild. Manuell starten.</div>
<div class="overlay bottom"><span class="tag" id="visionTag">vision --</span><span class="tag" id="audioTag">audio --</span><span class="tag" id="metaTag">callbacks --</span><span class="tag" id="camSrcTag">cam --</span></div>
</div>
</div>
<div class="sidebar">
<div class="section"><h3>System</h3><div class="panel"><div class="grid"><div class="card"><b>HTTP</b><span id="httpVal">offline</span></div><div class="card"><b>Vision</b><span id="visionVal">--</span></div><div class="card"><b>Preview</b><span id="previewVal">--</span></div><div class="card"><b>Base / Head</b><span id="motionVal">--</span></div><div class="card"><b>Mic</b><span id="micVal">--</span></div><div class="card"><b>Recognizer</b><span id="recVal">--</span></div></div><div class="row" style="margin-top:10px"><button id="camStart" class="full">Snapshot Start</button><button id="camStop" class="full">Snapshot Stop</button></div></div></div>
<div class="section"><h3>Fahren</h3><div class="panel"><div class="dpad"><div class="empty"></div><button data-l="1" data-a="0">^</button><div class="empty"></div><button data-l="0" data-a="1">&lt;</button><button data-l="0" data-a="0">STOP</button><button data-l="0" data-a="-1">&gt;</button><div class="empty"></div><button data-l="-1" data-a="0">v</button><div class="empty"></div></div><div style="margin-top:10px">Speed <span id="speedVal">0.40</span><input id="speed" type="range" min="0.1" max="1" step="0.05" value="0.4"></div><div style="margin-top:10px">Turn <span id="turnVal">0.80</span><input id="turn" type="range" min="0.2" max="2" step="0.1" value="0.8"></div></div></div>
<div class="section"><h3>Kopf</h3><div class="panel"><div id="headPad"><div id="headDot"></div></div><button id="centerHead" class="full" style="margin-top:10px">Zentrieren</button></div></div>
<div class="section"><h3>Sprechen</h3><div class="panel"><div class="row"><input id="speakText" type="text" placeholder="Text eingeben..."><button id="speakBtn">Sprechen</button></div></div></div>
<div class="section"><h3>Audio Input</h3><div class="panel"><div class="row"><button id="audioBtn" class="full">2s Mic aufnehmen</button><button id="audioInfo" class="full">Audio Status</button></div><audio id="audioPlayer" class="audioPlayer" controls preload="none"></audio><div id="audioHint" style="margin-top:8px;color:#89a">Kein Auto. Mic nur per Klick ueber /audio.wav.</div></div></div>
<div class="section"><h3>Log</h3><div class="panel" style="padding:0"><div id="log"></div></div></div>
</div>
<script>
let baseUrl="",snapTimer=null,camRunning=false,last=0,speed=0.4,turn=0.8,headYaw=0,headPitch=0,camBusy=false,camFailures=0,lastCamError="",hadCamFrame=false;const $=id=>document.getElementById(id);const log=m=>{const d=document.createElement('div');d.textContent=new Date().toLocaleTimeString('de-DE')+' '+m;$('log').appendChild(d);$('log').scrollTop=$('log').scrollHeight};const setConn=(ok,t)=>{$('dot').className='dot '+(ok?'ok':'err');$('status').textContent=t};async function j(path){const r=await fetch(baseUrl+path,{signal:AbortSignal.timeout(3500)});const txt=await r.text();if(!r.ok)throw new Error(txt||('HTTP '+r.status));return JSON.parse(txt)}async function send(cmd){if(!baseUrl)throw new Error('Nicht verbunden');log('-> '+JSON.stringify(cmd));const r=await fetch(baseUrl+'/cmd',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cmd)});if(!r.ok)throw new Error('HTTP '+r.status)}function applyStatus(s){$('httpVal').textContent=s.status==='ok'?'online':'unknown';$('visionVal').textContent=s.vision?'bound':'down';$('previewVal').textContent=s.preview?'running':'idle';$('motionVal').textContent=(s.base?'base':'no base')+' / '+(s.head?'head':'no head');$('micVal').textContent=s.listening?'live':'wav only';$('recVal').textContent=s.recognizer?'bound':'not bound';$('visionTag').textContent='vision '+(s.vision?'on':'off');$('audioTag').textContent='recognizer '+(s.recognizer?'on':'off');$('metaTag').textContent='callbacks '+(s.frameCallbacks??'--')+' / '+(s.colorWidth??'--')+'x'+(s.colorHeight??'--');$('camSrcTag').textContent='cam '+(s.cameraSource||'--')+' / '+(s.lastFrameStatus||'--')}async function refreshStatus(){if(!baseUrl){log('Nicht verbunden');return}try{const s=await j('/');setConn(true,'Verbunden');applyStatus(s);log('Status geladen')}catch(e){setConn(false,'Statusfehler');log('Status: '+e.message)}}$('connect').onclick=async()=>{baseUrl='http://'+$('addr').value.trim();try{const s=await j('/');setConn(true,'Verbunden');applyStatus(s);log('Verbunden mit '+baseUrl)}catch(e){baseUrl='';setConn(false,'Nicht erreichbar');log('Connect: '+e.message)}};$('refresh').onclick=refreshStatus;function scheduleCam(delay=300){if(!camRunning)return;if(snapTimer)clearTimeout(snapTimer);snapTimer=setTimeout(pollCam,delay)}$('camStart').onclick=()=>{if(!baseUrl){log('Nicht verbunden');return}hadCamFrame=false;camFailures=0;lastCamError="";camBusy=false;camRunning=true;if(snapTimer)clearTimeout(snapTimer);$('camState').textContent='camera polling';$('camMsg').textContent='Warte auf Snapshot...';$('camMsg').style.display='block';log('Snapshot gestartet');pollCam()};$('camStop').onclick=()=>{if(snapTimer)clearTimeout(snapTimer);snapTimer=null;camRunning=false;camBusy=false;$('cam').style.display='none';$('camMsg').style.display='block';$('camMsg').textContent='Kein Kamerabild. Manuell starten.';$('camState').textContent='camera idle';$('fps').textContent='fps --';log('Snapshot gestoppt')};async function pollCam(){if(!camRunning||camBusy)return;camBusy=true;try{const t=Date.now();const r=await fetch(baseUrl+'/snapshot?t='+t,{signal:AbortSignal.timeout(6000),cache:'no-store'});if(!r.ok)throw new Error(await r.text());const b=await r.blob();const old=$('cam').src;const url=URL.createObjectURL(b);$('cam').src=url;$('cam').style.display='block';$('camMsg').style.display='none';if(old&&old.startsWith('blob:'))URL.revokeObjectURL(old);hadCamFrame=true;camFailures=0;lastCamError="";$('camState').textContent='camera frame ok';$('fps').textContent='fps '+(last?(1000/(t-last)).toFixed(1):'--');last=t;refreshStatus().catch(()=>{});}catch(e){camFailures++;lastCamError=e.message;$('camState').textContent='camera retry '+camFailures;if(!hadCamFrame){$('cam').style.display='none';$('camMsg').style.display='block';$('camMsg').textContent=e.message}else{$('camMsg').style.display='block';$('camMsg').textContent='Letztes Bild bleibt stehen. Fehler: '+e.message}if(camFailures===1||camFailures%5===0)log('Kamera: '+e.message)}finally{camBusy=false;if(camRunning)scheduleCam(camFailures?900:280)}}
$('audioInfo').onclick=async()=>{if(!baseUrl){log('Nicht verbunden');return}try{const a=await j('/audio');const level=(a.lastAudioPeak??0)>0?(' Quelle: '+(a.lastAudioSource||'--')+', Peak: '+a.lastAudioPeak):'';$('audioHint').textContent=a.lastRecognition?('Letzte Erkennung: "'+a.lastRecognition+'"'):('Mic ueber /audio.wav, Recognizer: '+(a.recognizer?'bound':'not bound')+level);log('Audio-Status geladen')}catch(e){log('Audio: '+e.message)}};$('audioBtn').onclick=async()=>{if(!baseUrl){log('Nicht verbunden');return}$('audioHint').textContent='Mic-Aufnahme laeuft...';$('audioBtn').textContent='Nimmt auf...';$('audioBtn').disabled=true;try{const r=await fetch(baseUrl+'/audio.wav?t='+Date.now(),{signal:AbortSignal.timeout(10000)});if(!r.ok)throw new Error('HTTP '+r.status);const b=await r.blob();const old=$('audioPlayer').src;const url=URL.createObjectURL(b);$('audioPlayer').src=url;if(old&&old.startsWith('blob:'))URL.revokeObjectURL(old);$('audioPlayer').play().catch(()=>{});$('audioHint').textContent='Mic-Aufnahme geladen: '+b.size+' Bytes';log('Mic-Aufnahme geladen')}catch(e){$('audioHint').textContent='Mic-Fehler: '+e.message;log('Mic: '+e.message)}finally{$('audioBtn').textContent='2s Mic aufnehmen';$('audioBtn').disabled=false}};$('speakBtn').onclick=async()=>{const text=$('speakText').value.trim();if(!text)return;try{await send({cmd:'speak',text});$('speakText').value=''}catch(e){log('Speak: '+e.message)}};$('speed').oninput=e=>{speed=parseFloat(e.target.value);$('speedVal').textContent=speed.toFixed(2)};$('turn').oninput=e=>{turn=parseFloat(e.target.value);$('turnVal').textContent=turn.toFixed(2)};document.querySelectorAll('.dpad button').forEach(btn=>{const fire=()=>{const l=parseFloat(btn.dataset.l)*speed;const a=parseFloat(btn.dataset.a)*turn;if(l===0&&a===0)send({cmd:'stop'}).catch(()=>{});else send({cmd:'move',linear:l,angular:a}).catch(e=>log('Move: '+e.message))};btn.onmousedown=()=>{btn.classList.add('pressed');fire()};btn.onmouseup=()=>{btn.classList.remove('pressed');send({cmd:'stop'}).catch(()=>{})};btn.onmouseleave=()=>{btn.classList.remove('pressed')}});const pad=$('headPad'),dot=$('headDot');function headCursor(nx,ny){dot.style.left=(nx*100)+'%';dot.style.top=(ny*100)+'%'}function headSend(nx,ny){headYaw=+(((nx-0.5)*3).toFixed(2));headPitch=+(((ny-0.5)*1.6).toFixed(2));headCursor(nx,ny);send({cmd:'head',yaw:headYaw,pitch:headPitch}).catch(e=>log('Head: '+e.message))}pad.onmousedown=e=>{const r=pad.getBoundingClientRect();headSend(Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)),Math.max(0,Math.min(1,(e.clientY-r.top)/r.height)))};$('centerHead').onclick=()=>{headCursor(.5,.5);send({cmd:'head',yaw:0,pitch:0}).catch(()=>{})};headCursor(.5,.5);log('Dashboard bereit. Kein Auto-Connect, kein Auto-Refresh, kein Auto-Start.')
</script>
</body>
</html>
